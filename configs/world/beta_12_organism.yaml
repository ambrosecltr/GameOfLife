# Beta 013 world (save prefix beta_12): the measured, livable substrate inherited
# from the completed anima track, with beta's longer senescence envelope.
#
# This is not an easier task configuration; there is no task. It corrects
# physical mismatches found by energy-ledger measurement:
#   - signaling is near-free (0.001): communication should be selected by its
#     consequences, not suppressed by a hidden metabolic tax;
#   - water is drag plus a 1.75x metabolic surcharge, not drag plus a lethal 3x
#     double charge; in-water is already present in OBS v5 proprioception;
#   - a dormant body wakes functional at 38, just above brownout 25, after about
#     one natural light cycle. Solar cannot fund repair (repair starts at 60),
#     so sleep buys another attempt while food surplus buys long-term survival;
#   - turn_cost and water_speed_mult are now actually wired into physics.
#
# Food remains at the measured 2x reachability precondition. The scripted
# forager proved this density makes competence affordable while leaving poison,
# night scarcity, wear, repair, and mortality intact. Senescence stays at beta's
# 150k half-life rather than anima's deliberately sharpened 90k selection clock:
# this round must first test whether one artificial organism can learn durable
# control before shortening its developmental window for evolution.

seed: 7
size: [256, 256, 64]
