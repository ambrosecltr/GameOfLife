# Experiment: research question 2 — are curiosity-driven agents drawn to each
# other because they are each other's most unpredictable objects?
#
# Protocol: run this config and its twin (--set with dreamer_masked) on the
# SAME world seed, same duration; compare robot-robot contact events,
# co-location in the visit heatmap, and per-agent curiosity when other robots
# are in view.
#
#   uv run gol-run saves/exp_social_a --new --config configs/run/exp_social_curiosity.yaml
#   uv run gol-run saves/exp_social_b --new --config configs/run/exp_social_curiosity.yaml \
#       --set 'population.mix=[{brain: configs/brain/dreamer_masked.yaml, count: 6}, {brain: {kind: scripted_forager}, count: 2}]'

world_config: configs/world/default.yaml

tick_rate: 20
act_every: 5
checkpoint_interval_ticks: 30000
control_port: 7301

devices:
  inference: cuda
  learning: cuda

population:
  target: 8
  respawn_delay_ticks: 1200
  inherit_weights: lineage
  mix:
    - brain: configs/brain/dreamer.yaml
      count: 6
    - brain: { kind: scripted_forager }
      count: 2

observability:
  rerun: true
  rerun_fps: 10
  metrics_every_ticks: 100
  rrd_rotate_sim_hours: 6
