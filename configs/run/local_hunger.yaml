# The hunger experiment (beta_05): local_social with a rebalanced homeostat.
# Identical world and population to local_social.yaml — the only variable is
# the dreamer reward balance (configs/brain/dreamer_hungry.yaml), so beta_04
# serves directly as the curiosity-only baseline.

world_config: configs/world/default.yaml

tick_rate: 20
act_every: 5
checkpoint_interval_ticks: 30000
control_port: 7301

devices:
  inference: cpu
  learning: cpu

population:
  target: 6
  respawn_delay_ticks: 1200
  inherit_weights: lineage
  mix:
    - brain: configs/brain/dreamer_hungry.yaml
      count: 3
    - brain: { kind: scripted_forager }
      count: 3

observability:
  rerun: true
  rerun_fps: 10
  metrics_every_ticks: 100
  rrd_rotate_sim_hours: 6
