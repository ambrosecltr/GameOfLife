# Aion 01 — first continuous-time S5 lineage round.
#
# The world and population structure match beta 013 so the architecture and
# lifecycle changes remain attributable. Run the synchronized 4090/5090/H100
# preflight before starting the long round; 1,024 graded steps plus 256 burn-in
# at batch 8 is intentionally a substantial consolidation workload.
#
#   scripts/bench_aion_preflight.sh /tmp/aion-preflight <gpu-hourly-price>
#
#   PYTHONUNBUFFERED=1 uv run gol-run --new saves/aion_01 \
#       --config configs/run/aion_01.yaml

world_config: configs/world/beta_12_organism.yaml

tick_rate: 20
act_every: 5
checkpoint_interval_ticks: 30000
control_port: 7305

# Work-conserving wall-clock execution. The controller measures aggregate
# learner capacity and holds a bounded update lag; it never changes train_ratio,
# replay shape, action cadence, or the fixed 1/20 s world timestep.
pacing:
  mode: adaptive
  debt_policy: backpressure
  headroom: 0.85
  min_tick_rate: 1.0
  max_tick_rate: 1000.0
  max_debt_updates: 4.0
  resume_debt_updates: 2.0
  hysteresis: 0.1

dormancy_acceleration:
  exact_unpaced: true
  event_fast_forward: true
  max_jump_ticks: 100000

devices:
  inference: cuda
  learning: cuda

population:
  target: 6
  respawn_delay_ticks: 1200
  inherit_weights: lineage
  mix:
    - brain: configs/brain/aion_01_s5.yaml
      count: 3
    - brain: { kind: scripted_forager }
      count: 3

observability:
  rerun: false
  metrics_every_ticks: 100
