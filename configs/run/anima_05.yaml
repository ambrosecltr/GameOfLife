# anima_05 — the economy-and-senses pass, then the brain re-test.
# anima_04 (calibration) proved the per-ACTION economy is already forager-equal;
# the plastic overhead was screaming (fixed: signal_cost 0.001) + swimming. This
# round fixes the two genuine misalignments and holds the brain FIXED (verbatim
# anima_03 plastic brain), so the question is clean: does a fair, sensable world
# let the same brain finally forage — and does eating-while-hungry beat frozen?
#
#   world  — water_drain_mult 3.0 → 1.75 (drag, not a 3× tax; speed_mult 0.5
#            already doubles crossing energy) PAIRED with an OBS_VERSION-5
#            in-water proprio channel (idx 18) so the hazard is FELT; and
#            wake_energy 65 → 38 (sleep restores to functional, one rest cycle;
#            still < repair_threshold 60 so the mortality gradient holds).
#   brain  — unchanged (appetite 2.0, decay 1e-4, tau 60, rectified gate).
#   repro  — thrive_energy 75 (still > wake 38; one meal from a 38 wake = 78 > 75,
#            so a bud still costs an earned meal).
#
# RUN BOTH ARMS: anima_05 (this) + anima_05_frozen. The plastic-vs-frozen
# eating-while-hungry verdict is the payoff anima_03/04 deferred.
#
#   PYTHONUNBUFFERED=1 uv run gol-run --new saves/anima_05 \
#       --config configs/run/anima_05.yaml --headless
# (omit --headless to watch live in rerun. OBS_VERSION 5: old checkpoints won't
# load — anima_05 is a fresh founder population, so this costs nothing.)

world_config: configs/world/anima_05.yaml

tick_rate: 20
act_every: 5
checkpoint_interval_ticks: 30000
control_port: 7318            # anima_03 7314 / 03_frozen 7315 / anima_04 7316-17

devices:
  inference: cpu
  learning: cpu

population:
  target: 48                  # 42 plastic + 6 forager (the cap budding fills toward)
  respawn_delay_ticks: 1200   # only used for the forager anchor + the extinction floor
  inherit_weights: random_living
  mix:
    - brain: configs/brain/anima_05_plastic.yaml
      count: 42
    - brain: { kind: scripted_forager }
      count: 6                # fixed anchor — foragers don't bud, respawn to count

reproduction:
  mode: budding               # earned, endogenous reproduction (proposal 004)
  # thrive_energy 75 stays above wake_energy 38 (instantaneous thrive check —
  # waking must never be free bud-eligibility); one meal from a 38 wake clears
  # it (38 + 40 = 78 > 75); 75 − 40 bud cost = 35 > brownout 25.
  thrive_energy: 75.0
  thrive_integrity: 70.0      # an intact, well-lived body
  min_bud_age: 20000          # ~a sim-day: no budding as a juvenile
  bud_cooldown: 15000         # ticks between a parent's buds
  bud_cost_energy: 40.0       # reproduction spends the parent's surplus (= one meal)
  bud_cost_integrity: 5.0     # and a little of its body
  floor: 4                    # emergency respawn if plastic falls below this (extinction guard)

observability:
  rerun: false                # headless background run; flip on (+ drop --headless) to watch
  rerun_memory_limit: "2GB"
  metrics_every_ticks: 100
