# anima_02 — the finitude round (proposal 004). Same plastic-valence brain as
# anima_01, but the WORLD and the POPULATION RULES change so that mortality
# matters instead of being taught:
#
#   1. Finite, FELT lifespan (world: configs/world/anima_02.yaml) — sharpened
#      senescence so bodies die of old age, plus the OBS_VERSION-4 senescence
#      proprio channel so the agent can feel its life running down.
#   2. EARNED reproduction (reproduction.mode: budding) — an evolving lineage
#      continues only when a THRIVING body spends its own surplus to bud a
#      child. Lineages that sleep their finite lives away leave fewer
#      descendants, so a survival instinct can be SELECTED FOR rather than
#      rewarded. A low floor guards against extinction; foragers stay a fixed
#      anchor of 6 via respawn (they're instruments, they don't bud).
#   3. Curiosity (already in the brain) is the reason to be awake — finite,
#      felt time + curiosity = "I want to experience the life I have."
#
# No survival reward, no forage directive: these are properties of the world
# and the body, plus natural selection. The bet is that "fight to live out of
# fear of wasting the little time I have" is the only strategy left standing.
#
#   PYTHONUNBUFFERED=1 uv run gol-run --new saves/anima_02 \
#       --config configs/run/anima_02.yaml
# (omit --headless to watch live in rerun.)
#
# NOTE (OBS_VERSION 4): old anima_01/beta brain checkpoints will NOT load — the
# proprio contract changed (senescence channel). anima_02 is a fresh founder
# population, so this costs nothing. Read P1-P4 across GENERATIONS, not within a
# life — the whole point is that the instinct evolves, which is slow.

world_config: configs/world/anima_02.yaml

tick_rate: 20
act_every: 5
checkpoint_interval_ticks: 30000
control_port: 7313            # distinct from anima_01 (7311) / frozen (7312)

devices:
  inference: cpu
  learning: cpu

population:
  target: 48                  # 42 plastic + 6 forager (the cap budding fills toward)
  respawn_delay_ticks: 1200   # only used for the forager anchor + the extinction floor
  inherit_weights: random_living
  mix:
    - brain: configs/brain/anima_01_plastic.yaml
      count: 42
    - brain: { kind: scripted_forager }
      count: 6                # fixed anchor — foragers don't bud, respawn to count

reproduction:
  mode: budding               # THE round knob: earned, endogenous reproduction
  thrive_energy: 75.0         # sustained energy above this to be eligible to bud
  thrive_integrity: 70.0      # an intact, well-lived body
  min_bud_age: 20000          # ~a sim-day: no budding as a juvenile
  bud_cooldown: 15000         # ticks between a parent's buds
  bud_cost_energy: 40.0       # reproduction spends the parent's surplus (= one meal)
  bud_cost_integrity: 5.0     # and a little of its body
  floor: 4                    # emergency respawn if plastic falls below this (extinction guard)

observability:
  rerun: false                # headless background run; flip on (+ drop --headless) to watch
  rerun_memory_limit: "2GB"
  metrics_every_ticks: 100
