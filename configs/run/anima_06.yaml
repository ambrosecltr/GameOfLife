# anima_06 — the level-valence round. BRAIN-ONLY change vs anima_05: the plastic
# modulator M now reads the felt LEVEL, not its change.
#
# anima_05 proved a fair, sensable world does NOT by itself produce foraging.
# The forensic read (journal anima/006) found the modulator geometry was the
# blocker: change-based comfort M was negative on 99.9% of steps and telescoped
# net-negative over a mortal life, and the rectified viability gate was inert
# (m_viability ≡ 0 across 1.4M ticks). A plastic brain has no critic to turn a
# stream of reductions into a value, so it must read the level directly. Offline
# screen (scripts/anima_valence_screen.py) confirmed the level form's life-return
# correlates +0.70 with mean energy / +0.4 with eating where the reduction form
# correlated −0.80 / −0.41 — it had been rewarding the opposite of survival.
#
# The world, population, and reproduction are held FIXED (identical to anima_05,
# copied so the round freezes independently). Only the brain yaml changed:
# d_ref 0.40 (neutral hunger), viability standing tax 0.5, tau 60 → 120 (credit
# window 600).
#
# RUN BOTH ARMS: anima_06 (this) + anima_06_frozen. The plastic-vs-frozen
# eating-while-hungry verdict now has a correctly-pointed teaching signal.
#
# Health metric to watch (the screen's caveat): life_return sign. It was
# structurally negative under reduction; if fed agents emerge under level
# valence it should cross positive. If it stays uniformly negative, the world is
# still too harsh (median awake energy was 26) and the next lever is the world
# config, not the valence.
#
#   PYTHONUNBUFFERED=1 uv run gol-run --new saves/anima_06 \
#       --config configs/run/anima_06.yaml --headless
# (omit --headless to watch live in rerun. Fresh founder population — OBS v5.)

world_config: configs/world/anima_06.yaml

tick_rate: 20
act_every: 5
checkpoint_interval_ticks: 30000
control_port: 7320            # anima_05 7318 / 05_frozen 7319

devices:
  inference: cpu
  learning: cpu

population:
  target: 48                  # 42 plastic + 6 forager (the cap budding fills toward)
  respawn_delay_ticks: 1200   # only used for the forager anchor + the extinction floor
  inherit_weights: random_living
  mix:
    - brain: configs/brain/anima_06_plastic.yaml
      count: 42
    - brain: { kind: scripted_forager }
      count: 6                # fixed anchor — foragers don't bud, respawn to count

reproduction:
  mode: budding               # earned, endogenous reproduction (proposal 004)
  thrive_energy: 75.0         # > wake 38; one meal from a 38 wake = 78 > 75 (an earned bud)
  thrive_integrity: 70.0      # an intact, well-lived body
  min_bud_age: 20000          # ~a sim-day: no budding as a juvenile
  bud_cooldown: 15000         # ticks between a parent's buds
  bud_cost_energy: 40.0       # reproduction spends the parent's surplus (= one meal)
  bud_cost_integrity: 5.0     # and a little of its body
  floor: 4                    # emergency respawn if plastic falls below this (extinction guard)

observability:
  rerun: false                # headless background run; flip on (+ drop --headless) to watch
  rerun_memory_limit: "2GB"
  metrics_every_ticks: 100
