# anima_03_frozen — the frozen-net CONTROL arm for anima_03 (P3 pattern).
# Identical world, population, and reproduction rules; the only difference is
# the brain yaml (plasticity.enabled false — appetite and the rectified gate
# stay ON, they are innate design present in both arms). anima_01's frozen
# control matched the plastic flagship on every behavioral metric; anima_03's
# question is whether removing the four blockers finally gives W_fast a job:
# plastic must BEAT this arm on eating-while-hungry to claim within-life
# learning works. See configs/run/anima_03.yaml for the round rationale.
#
#   PYTHONUNBUFFERED=1 uv run gol-run --new saves/anima_03_frozen \
#       --config configs/run/anima_03_frozen.yaml --headless

world_config: configs/world/anima_03.yaml

tick_rate: 20
act_every: 5
checkpoint_interval_ticks: 30000
control_port: 7315            # anima_03 flagship is 7314

devices:
  inference: cpu
  learning: cpu

population:
  target: 48                  # 42 plastic + 6 forager (the cap budding fills toward)
  respawn_delay_ticks: 1200   # only used for the forager anchor + the extinction floor
  inherit_weights: random_living
  mix:
    - brain: configs/brain/anima_03_frozen.yaml
      count: 42
    - brain: { kind: scripted_forager }
      count: 6                # fixed anchor — foragers don't bud, respawn to count

reproduction:
  mode: budding               # earned, endogenous reproduction (proposal 004)
  thrive_energy: 65.0         # ROUND-anima_03: must clear wake_energy 55 or waking = free
                              # eligibility (see configs/run/anima_03.yaml); needs ≥1 meal
  thrive_integrity: 70.0      # an intact, well-lived body
  min_bud_age: 20000          # ~a sim-day: no budding as a juvenile
  bud_cooldown: 15000         # ticks between a parent's buds
  bud_cost_energy: 40.0       # reproduction spends the parent's surplus (= one meal)
  bud_cost_integrity: 5.0     # and a little of its body
  floor: 4                    # emergency respawn if plastic falls below this (extinction guard)

observability:
  rerun: false                # headless background run; flip on (+ drop --headless) to watch
  rerun_memory_limit: "2GB"
  metrics_every_ticks: 100
