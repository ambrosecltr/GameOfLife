# anima_06_frozen — the frozen-net CONTROL for anima_06 (level-valence round).
# Identical to anima_06_plastic.yaml — level valence (d_ref 0.40, standing tax
# 0.5), long tau, appetite ON — except plasticity is OFF (W_fast never moves).
# Appetite is innate body design so it stays in both arms; the pair isolates
# what within-life plasticity (W_fast) adds on top of the evolved reflex now
# that the modulator finally reads the level (see anima_06_plastic.yaml header).
#
# The bar anima_03/04/05 all deferred and this round finally has a fair shot at:
# plastic > frozen on eating-while-hungry, now that the teaching signal points
# the right way (screen: level return correlates +0.70 with energy vs the
# reduction form's −0.80). If plastic ≈ frozen AGAIN even with a correct signal,
# that is a strong statement about the within-life Hebbian rule's ceiling.
#
#   PYTHONUNBUFFERED=1 uv run gol-run --new saves/anima_06_frozen \
#       --config configs/run/anima_06_frozen.yaml --headless

kind: plastic

core:
  hidden: 256                  # small GRU; no world model to size

plasticity:
  enabled: false               # FROZEN CONTROL: pure evolved reflex (genome + W_slow), W_fast never moves
  alpha: 0.1                   # base plasticity coefficient (per-layer alpha is a gene)
  tau: 120.0                   # ROUND-anima_06: was 60 — matches the plastic arm (credit window 600)
  decay: 1.0e-4                # meal engrams outlive the drain cycle (unused when frozen)
  w_clip: 2.0                  # |W_fast| clip — keeps a fully-plastic net finite

restlessness: 0.2              # motor-noise scale + discrete-exploration floor (a gene)
appetite_gain: 2.0             # hunger scales restlessness ~1×(sated)→~2×(starving); a gene

# --- the feeling signal M — LEVEL valence (anima_06): read the level, not its change ---
valence:
  comfort_gain: 3.0            # weight on comfort satisfaction (d_ref − d) in M
  drive:                       # Keramati–Gutkin comfort drive (shared feeling.drive_level)
    pow_m: 3.0
    pow_n: 2.0
    energy_setpoint: 0.85
    integrity_setpoint: 1.0
    rested_setpoint: 1.0
    energy_weight: 1.0
    integrity_weight: 1.0
    rest_weight: 0.5
    d_ref: 0.40                # ROUND-anima_06: neutral hunger level; fed<0.40<hungry
  viability:                   # log-barrier to the LETHAL floor (shared feeling.viability)
    rectified: true            # UNUSED in the level form (kept for checkpoint/config parity)
    viability_gain: 3.0        # UNUSED in the level form (was the reduction-escape weight)
    standing_gain: 0.5         # ROUND-anima_06: viability enters as a standing danger tax (−0.5·V)
    barrier_cap: 4.0
    energy_lethal: 0.0
    energy_safe: 0.25
    integrity_lethal: 0.0
    integrity_safe: 0.5
    energy_weight: 1.0
    integrity_weight: 1.0
  modulator:
    gain: 1.0                  # global M gain (a gene)
    clip: 5.0                  # |M| clamp — stability guard

genome:
  enabled: true
  sigma: 0.25                  # founder diversity (log-stddev over gene multipliers)
  mutation_sigma: 0.1          # gene drift on inherit
  weight_mutation_sigma: 0.05  # innate W_slow jitter on inherit (evolvable wiring)

# genome = Darwinian (reinit W_fast on inherit); lineage = Lamarckian (carry W_fast).
inherit_mode: genome
