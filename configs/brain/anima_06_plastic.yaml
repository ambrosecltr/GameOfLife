# anima_06_plastic — the LEVEL-VALENCE fix. The single change vs anima_05 is
# how the modulator M reads feeling: the LEVEL directly, not its change.
#
# anima_05 (economy-and-senses, brain = anima_03) established the world is fair
# and sensable and STILL no foraging emerged. The forensic read (journal
# anima/006) found the bug is not the world but the modulator's geometry:
#   - comfort M = comfort_gain·(prev_d − d) was NEGATIVE on 99.9% of act-steps
#     (every draining tick is a tiny "ow"; a meal is one rare spike) and
#     telescoped net-negative over any mortal life (life_return ≈ −1.2);
#   - the rectified viability gate was INERT — m_viability ≡ 0.000 across 1.4M
#     ticks — because it only fires on in-stream recovery from below-safe, which
#     never happens (agents hibernate and reset the stream first).
# Root cause: a plastic brain has NO CRITIC to integrate a stream of reductions
# back into a value, so a change-based signal teaches ~nothing — "being fed"
# earns zero because it is not a transition. The dreamer can use reductions
# because its critic reconstructs the level; anima must read the level directly.
#
# Offline-screened before launch (scripts/anima_valence_screen.py on the
# anima_05 saves): level life-return correlates +0.70 with mean energy and
# +0.4 with eating; the reduction form correlated −0.80 / −0.41 — it rewarded
# volatile near-death cycling, the OPPOSITE of staying fed. Camping cannot
# out-score foraging (corr(return, eat) rises with d_ref; in this world only
# eating raises energy). The standing viability term fires on 64.5% of awake
# steps where the gate was ≡0. Caveat the screen also surfaced: on the starving
# anima_05 population no d_ref makes a fed life NET-positive — that is a world-
# harshness signal, not a valence bug; watch life_return sign as the health
# metric (see anima_06 world header for the next lever if it stays negative).
#
# The two changes (everything else verbatim anima_05_plastic):
#   valence.drive.d_ref 0.40   — neutral hunger level: fed (d<0.40) → +M,
#                                hungry (d>0.40) → −M. ~0.40 puts neutral just
#                                above the brownout floor (energy ≈31), peak of
#                                corr(return, energy) in the screen.
#   valence.viability.standing_gain 0.0 → 0.5 — viability now enters M as a
#                                standing danger tax (−0.5·V), gene-scaled, so
#                                selection can tune the survival weight.
#   plasticity.tau 60 → 120    — credit window 300 → 600 ticks: a level signal
#                                that is on every step wants a longer trace to
#                                span a full approach-then-feed, not just the
#                                final grip.
#
# Frozen control: anima_06_frozen.yaml (plasticity OFF, level valence ON).

kind: plastic

core:
  hidden: 256                  # small GRU; no world model to size

plasticity:
  enabled: true                # false = the frozen-net control, see anima_06_frozen.yaml
  alpha: 0.1                   # base plasticity coefficient (per-layer alpha is a gene)
  tau: 120.0                   # ROUND-anima_06: was 60 — credit window 600 ticks (level M is
                               # on every step; the trace must span approach+feed, not one grip)
  decay: 1.0e-4                # meal engrams outlive the drain cycle (engram half-life ~35k ticks)
  w_clip: 2.0                  # |W_fast| clip — keeps a fully-plastic net finite

restlessness: 0.2              # motor-noise scale + discrete-exploration floor (a gene)
appetite_gain: 2.0             # hunger scales restlessness ~1×(sated)→~2×(starving); a gene

# --- the feeling signal M — LEVEL valence (anima_06): read the level, not its change ---
valence:
  comfort_gain: 3.0            # weight on comfort satisfaction (d_ref − d) in M
  drive:                       # Keramati–Gutkin comfort drive (shared feeling.drive_level)
    pow_m: 3.0
    pow_n: 2.0
    energy_setpoint: 0.85
    integrity_setpoint: 1.0
    rested_setpoint: 1.0
    energy_weight: 1.0
    integrity_weight: 1.0
    rest_weight: 0.5
    d_ref: 0.40                # ROUND-anima_06: neutral hunger level; fed<0.40<hungry (see header)
  viability:                   # log-barrier to the LETHAL floor (shared feeling.viability)
    rectified: true            # UNUSED in the level form (kept for checkpoint/config parity)
    viability_gain: 3.0        # UNUSED in the level form (was the reduction-escape weight)
    standing_gain: 0.5         # ROUND-anima_06: was 0.0 — viability enters as a standing danger
                               # tax (−0.5·V), gene-scaled; screened as the level survival teacher
    barrier_cap: 4.0
    energy_lethal: 0.0
    energy_safe: 0.25
    integrity_lethal: 0.0
    integrity_safe: 0.5
    energy_weight: 1.0
    integrity_weight: 1.0
  modulator:
    gain: 1.0                  # global M gain (a gene)
    clip: 5.0                  # |M| clamp — stability guard

genome:
  enabled: true
  sigma: 0.25                  # founder diversity (log-stddev over gene multipliers)
  mutation_sigma: 0.1          # gene drift on inherit
  weight_mutation_sigma: 0.05  # innate W_slow jitter on inherit (evolvable wiring)

# genome = Darwinian (reinit W_fast on inherit); lineage = Lamarckian (carry W_fast).
inherit_mode: genome
