# Reachability variant of beta_09_dreamer.yaml — the round-011 brain (save
# prefix beta_10; journal 010 is the swift-nano round). The validated
# conditioning stack (anchored normalizers, annealed trickle, boredom
# pressure) and the capacity bundle (preset base, train_ratio 1.0, cuda) are
# byte-identical to beta_09. EXACTLY two knobs are new, both aimed at round
# 009's verdict that the HRRL reward is well-shaped but unreachable:
#
#   reward.blackout: priced   — beta_09: the dormancy collapse never entered
#     the lived stream (wake severed salience) while replayed windows leaked
#     its delta UNPRICED as a jackpot (census on dreamer_043: every wake
#     +1.2, every death->rebirth stitch +3.9, vs +0.5 for a real meal — the
#     hibernation attractor was being paid). Priced: the pre-collapse step
#     is the wake observation's predecessor, one visible transition carrying
#     the real energy/integrity delta; HRRL prices the crash with no new
#     reward terms; blackout stops training as a termination so the actor
#     can plan across (and away from) it. Respawn remains a hard cut and is
#     now genuinely cut in replay too (is_first markers — code, all modes).
#   replay.prioritize: reward — reward-aware replay: a quarter of each batch
#     is drawn from windows containing a salient step (|realized drive
#     delta| > 0.1), so meals and priced blackouts actually reach the twohot
#     reward head. Changes what is learned from, never what is rewarded.
#     Gym-screened on the beta_09 life before launch (journal 011).
#
#   reward.spike_loss_weight: 4 — journal 010's pre-registered follow-up,
#     screened IN: with spikes oversampled the head still fit them 12%
#     better under weighting, best arm in every gym window. Same shared
#     constraint (reachability = spikes must reach the head AND be fit);
#     round-009 precedent for moving a bundle when one constraint is
#     indicted. Per-knob ablation flags remain for attribution.
#
# Deliberately NOT here (unvalidated at base scale, would confound
# reachability attribution): replay.burn_in, replay.recent,
# training.optimizer: muon, training.l2_init, training.compile.

kind: dreamer
preset: base                  # nano (~4M, local M1) | small (~12M) | base (~30M, cloud)

reward:
  w_curiosity: 1.0
  w_homeostasis: 1.0
  norm_anchor_samples: 1000000
  curiosity: lp
  lp:
    partition: latent
    regions: 32
    ema_fast: 0.02
    ema_slow: 0.002
    centroid_lr: 0.05
    relative: true
    mix_disagreement: 0.1
    mix_anneal_steps: 1500
  boredom:
    weight: 0.02
    stim_threshold: 0.5
    drive_threshold: 0.15
    pressure: true
    pressure_rise: 0.002
    pressure_decay: 0.0002
  homeostasis: drive
  drive:
    scale: 3.0
    level_penalty: 0.01
    pow_m: 3.0
    pow_n: 2.0
    energy_setpoint: 0.85
    energy_weight: 1.0
    integrity_setpoint: 1.0
    integrity_weight: 1.0
    rested_setpoint: 1.0
    rest_weight: 0.5
  # ROUND KNOB 1: the dormancy blackout is one visible, HRRL-priced
  # transition instead of a stream cut (semantics in dreamer/brain.py and
  # docs/training-ops.md).
  blackout: priced
  # ROUND KNOB 3 (screened in): gym on dreamer_043's life, final-500-update
  # spike error — uniform 0.68, prioritized 0.57, prioritized+weight4 0.50,
  # best in every window. Spikes count 5x in the twohot reward loss.
  spike_loss_weight: 4
  # events-mode knobs (legacy ablation):
  low_energy_threshold: 0.25
  low_energy_penalty: 0.02
  low_energy_graded: true
  curiosity_mask_agents: false

temperament:
  enabled: true
  sigma: 0.25
  mutation_sigma: 0.1

world_model:
  kl_free_bits: 1.0
  unimix: 0.01
  ensemble_size: 8

actor_critic:
  imagination_horizon: 15
  gamma: 0.997
  lam: 0.95
  entropy: 3.0e-4
  replay_ac: false

replay:
  capacity: 500000
  batch_size: 16
  seq_len: 64
  warmup_steps: 500
  # ROUND KNOB 2: reward-aware replay (defaults: rows = batch/4 = 4,
  # threshold 0.1 — the homeo_spike_frac bar).
  prioritize: reward

training:
  model_lr: 1.0e-4
  actor_lr: 3.0e-5
  critic_lr: 3.0e-5
  grad_clip: 100.0
  train_ratio: 1.0
