# Beta 013 artificial-organism brain (save prefix beta_12).
#
# This is a deliberate architecture round, not a one-knob ablation. Anima's
# seven-round result says unlearned plastic valence cannot create a usable
# teaching signal over a declining mortal life; a learned expectation/critic is
# constitutive. Beta 012 then installed a real mortality gradient but failed to
# turn it into multi-step behaviour. This brain keeps the learned world model
# and critic, then removes four conversion bottlenecks together:
#
#  1. Imagined affect reads predicted proprioception directly. The actor no
#     longer waits for one reward head to rediscover known bodily equations.
#     That head is still trained and logged as a diagnostic, never as the actor's
#     source of comfort/viability in this round.
#  2. Six distributional value channels preserve comfort, viability, curiosity,
#     boredom, mortality risk, and learned-skill controllability separately until
#     the actor combines them. Rare fear is no longer averaged away by curiosity.
#  3. An unnamed temporal-skill manager selects one of eight latent intentions
#     every five actions. A worker learns reusable motor patterns; a displacement
#     discriminator rewards controllable distinctions. There are no skill labels,
#     demonstrations, object names, or pretrained behaviours.
#  4. Terminal examples are weighted, boredom advances only on chronological lived
#     states, and act() reads immutable controller snapshots so learning cannot
#     make the body repeat a latched action for the duration of an update.
#
# Charter boundary: no externally assigned task reward, goal label,
# demonstration, pretrained skill, or designer fitness score. Prediction,
# bodily interoception, self-generated controllability, physical mortality,
# and differential reproduction are mechanisms of the simulated reality.

kind: dreamer
preset: base

reward:
  w_curiosity: 1.0
  w_homeostasis: 1.0
  imagined_homeostasis: proprio
  norm_anchor_samples: 1000000
  curiosity: lp
  lp:
    partition: latent
    regions: 32
    ema_fast: 0.02
    ema_slow: 0.002
    centroid_lr: 0.05
    relative: true
    mix_disagreement: 0.1
    mix_anneal_steps: 1500
  boredom:
    weight: 0.02
    stim_threshold: 0.5
    drive_threshold: 0.15
    pressure: true
    # Per-lived-act integrator. Its all-dull equilibrium is 0.5 rather than
    # beta_11's saturated 1.0 thermostat.
    pressure_rise: 0.0005
    pressure_decay: 0.001
    gate: viability
  homeostasis: drive
  drive:
    scale: 3.0
    level_penalty: 0.01
    pow_m: 3.0
    pow_n: 2.0
    energy_setpoint: 0.85
    energy_weight: 1.0
    integrity_setpoint: 1.0
    integrity_weight: 1.0
    rested_setpoint: 1.0
    rest_weight: 0.5
  viability:
    scale: 0.0
    floor: 1.0
    barrier_cap: 4.0
    total_cap: 4.0
    energy_lethal: 0.0
    energy_safe: 0.25
    integrity_lethal: 0.0
    integrity_safe: 0.5
    energy_weight: 1.0
    integrity_weight: 1.0
  death_terminal: true
  terminal_loss_weight: 32.0
  # Generic aversion to predicted cessation: log P(continue), never a named
  # action or survival score. Zero when continuation is certain, increasingly
  # negative as the world model predicts mortality.
  fear_weight: 0.1
  blackout: priced
  spike_loss_weight: 4
  low_energy_threshold: 0.25
  low_energy_penalty: 0.02
  low_energy_graded: true
  curiosity_mask_agents: false

temporal_skills:
  enabled: true
  num_skills: 8
  duration: 5
  intrinsic_weight: 0.1
  manager_entropy: 3.0e-4
  unimix: 0.01

temperament:
  enabled: true
  sigma: 0.25
  mutation_sigma: 0.1

world_model:
  kl_free_bits: 1.0
  unimix: 0.01
  ensemble_size: 8

actor_critic:
  imagination_horizon: 15
  gamma: 0.997
  lam: 0.95
  entropy: 3.0e-4
  vector_critic: true

replay:
  capacity: 500000
  batch_size: 16
  seq_len: 64
  warmup_steps: 500
  prioritize: reward

training:
  model_lr: 1.0e-4
  actor_lr: 3.0e-5
  critic_lr: 3.0e-5
  skill_lr: 1.0e-4
  grad_clip: 100.0
  train_ratio: 1.0
  async_inference: true
  publish_every: 16
